<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Prospect Review — DS Studios</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f13;color:#fff;overflow:hidden;height:100dvh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
#loader{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f0f13;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px}
#loader.hidden{display:none}
#loader h2{font-size:18px;margin-bottom:6px}
#loader p{font-size:11px;color:#6b7280;margin-bottom:20px;text-align:center}
#loader .btn{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
#loader .btn:hover{background:rgba(255,255,255,.1)}
.loader-input{display:none}
.preview-info{font-size:10px;color:#6b7280;margin-top:10px;text-align:center;max-width:300px}
.hd{display:flex;align-items:center;gap:10px;padding:12px 16px 0;max-width:420px;margin:0 auto;width:100%}
.hd .n{font-size:15px;font-weight:700}.hd .s{font-size:10px;color:#6b7280}
.hd .sb{font-weight:800;padding:4px 10px;border-radius:20px;font-size:12px}
.hd .pi{font-size:9px;color:#6b7280;margin-top:2px}
.hd .bm{font-size:9px;color:#6b7280;margin-top:1px}
.cs{flex:1;position:relative;overflow:hidden;padding:16px 12px 8px}.cw{position:relative;width:100%;height:100%;max-width:420px;margin:0 auto}
.card{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,#1a1a24,#12121a);border-radius:18px;padding:24px 20px 18px;box-shadow:0 8px 40px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;will-change:transform}
.scroll{flex:1;overflow-y:auto;padding-right:4px}.scroll::-webkit-scrollbar{width:3px}.scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.bdg{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.bdg.critical{background:rgba(239,68,68,.2);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.bdg.high{background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.bdg.medium{background:rgba(59,130,246,.2);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.bdg.low{background:rgba(156,163,175,.15);color:#9ca3af;border:1px solid rgba(156,163,175,.2)}
.card h2{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;line-height:1.2}
.card .dt{font-size:13px;color:#a0a0b0;line-height:1.55;margin-bottom:10px}
.cl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:#6b7280;margin-bottom:4px}
.cb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 10px;font-size:11px;color:#9ca3af;line-height:1.4;margin-bottom:6px}
.cr2{display:flex;gap:6px;margin-top:auto;padding-top:6px;flex-shrink:0}
.cr2 a{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,.1);color:#a0a0b0;background:rgba(255,255,255,.04)}
.ind{display:flex;justify-content:center;gap:5px;padding:6px 0 10px;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .2s}
.dot.on{background:#6366f1;width:18px;border-radius:3px}
.fb{display:flex;gap:8px;padding:6px 12px 16px;max-width:420px;margin:0 auto;width:100%;flex-shrink:0}
.fb button{flex:1;padding:12px 8px;border:0;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;transition:transform .05s}
.fb button:active{transform:scale(.96)}
.fb .bp{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.fb .bc{background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
.fb .bs{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.ds{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:100%;padding:20px}.ds.on{display:flex}
.ds .e{font-size:48px;margin-bottom:10px}
.ds h2{font-size:20px;margin-bottom:4px}
.ds p{font-size:12px;color:#9ca3af;margin-bottom:16px;line-height:1.5;max-width:360px}
.oc{font-size:11px;padding:6px 14px;border-radius:6px;margin-bottom:12px}
.oc.go{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.15)}
.oc.no{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.15)}
.eb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;max-height:200px;overflow-y:auto;width:100%;text-align:left;font-size:10px;color:#9ca3af;line-height:1.5;white-space:pre-wrap;margin-bottom:10px}
.ra{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:4px;flex-shrink:0}
.ra .rw{display:flex;gap:6px}
.ra button{flex:1;padding:10px;border:0;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer}
.ra .go{background:#22c55e;color:#000}
.ra .sp{background:rgba(255,255,255,.06);color:#9ca3af;border:1px solid rgba(255,255,255,.1)}
.ra .cp{background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.2)}
</style>
</head>
<body>

<!-- Loader screen -->
<div id="loader">
  <h2>DS Studios</h2>
  <p>Prospect Review Tool</p>
  <button class="btn" onclick="document.getElementById('fileInput').click()">📂 Load Prospect File</button>
  <input type="file" id="fileInput" class="loader-input" accept=".json" onchange="loadFile(event)">
  <div class="preview-info">Load a <strong>{id}-prospect.json</strong> file generated by the analyze script</div>
</div>

<!-- Main UI (hidden until data loaded) -->
<div class="hd" id="hdr"></div>
<div class="cs" id="sk"><div class="cw" id="cw"></div><div class="ind" id="dots"></div></div>
<div class="fb" id="fb"><button class="bp" onclick="sl('l')">✕ Skip</button><button class="bc" onclick="os()">🔍 Check Site</button><button class="bs" onclick="sl('r')">✓ Looks Good</button></div>

<!-- Done screen -->
<div class="ds" id="dn">
  <div class="e">🎯</div>
  <h2>All Reviewed</h2>
  <p id="dt"></p>
  <div class="oc" id="ob"></div>
  <div class="eb" id="ep"></div>
  <div class="ra">
    <div class="rw"><button class="go" id="bcopy" onclick="copyE()">📋 Copy & Send</button><button class="sp" onclick="rs()">↺ Review Again</button></div>
    <div class="rw"><button class="cp" onclick="copyE()">Copy Email Text</button><button class="sp" onclick="os()">Open Website</button></div>
  </div>
</div>

<script>
var D = null; // data
var ci = 0, v = null, anim = false;

function loadFile(ev) {
  var f = ev.target.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function(e) {
    try { D = JSON.parse(e.target.result); start(); } catch(ex) { alert('Invalid JSON file: ' + ex.message); }
  };
  r.readAsText(f);
}

function start() {
  document.getElementById('loader').classList.add('hidden');
  var s = D.score;
  var cls = s >= 70 ? 'g' : s >= 40 ? 'o' : 'b';
  document.getElementById('hdr').innerHTML = '<div><div class="n">' + D.businessName + '</div><div class="s">' + D.url + ' · ' + D.issues.length + ' issues</div></div><div class="sb ' + cls + '">' + s + '/100</div>';
  rc();
  ud();
}

function rc() {
  var c = document.getElementById('cw');
  if (ci >= D.issues.length) { sd(); return; }
  c.innerHTML = '';
  var max = Math.min(3, D.issues.length - ci);
  for (var i = 0; i < max; i++) {
    var iss = D.issues[ci + i];
    var d = document.createElement('div');
    d.className = 'card';
    d.style.zIndex = 3 - i;
    d.style.transform = i > 0 ? 'scale(' + (1 - i * 0.03) + ') translateY(' + (i * 6) + 'px)' : 'none';
    d.style.opacity = i > 0 ? 0.6 : 1;
    var sevCls = iss.severity === 'high' ? 'high' : iss.severity === 'medium' ? 'medium' : iss.severity === 'critical' ? 'critical' : 'low';
    d.innerHTML = '<div class="scroll"><span class="bdg ' + sevCls + '">' + iss.severity + '</span><h2>' + iss.label + '</h2><div class="dt">' + iss.detail + '</div><div class="cl">What to check</div><div class="cb">' + iss.check + '</div><div class="cl">Why it matters</div><div class="cb">' + iss.siteHint + '</div><div class="cr2"><a href="' + D.url + '" target="_blank">🔍 Open site</a><a href="' + D.url + '" target="_blank">📋 DevTools</a></div></div>';
    if (i === 0) {
      var sx = 0;
      d.addEventListener('touchstart', function(e) { if (anim) return; sx = e.touches[0].clientX; d.style.transition = 'none'; }, { passive: true });
      d.addEventListener('touchmove', function(e) { if (anim || !sx) return; var dx = e.touches[0].clientX - sx; if (Math.abs(dx) < 5) return; d.style.transform = 'translateX(' + dx + 'px) rotate(' + (dx * 0.08) + 'deg)'; d.style.opacity = 1 - Math.abs(dx) / 600; }, { passive: true });
      d.addEventListener('touchend', function(e) { if (anim || !sx) return; var dx = e.changedTouches[0].clientX - sx; d.style.transition = 'transform .35s ease, opacity .35s ease'; if (Math.abs(dx) > 80) sl(dx > 0 ? 'r' : 'l'); else { d.style.transform = 'none'; d.style.opacity = 1; } sx = 0; }, { passive: true });
    }
    c.appendChild(d);
  }
}

function ud() {
  var d = document.getElementById('dots');
  d.innerHTML = '';
  for (var i = 0; i < D.issues.length; i++) {
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === ci ? ' on' : '');
    d.appendChild(dot);
  }
}

function sl(dir) {
  if (anim || ci >= D.issues.length) return;
  anim = true;
  var tc = document.querySelector('.card');
  if (!tc) return;
  tc.style.transition = 'transform .35s ease, opacity .35s ease';
  tc.style.transform = dir === 'r' ? 'translateX(120%) rotate(12deg)' : 'translateX(-120%) rotate(-12deg)';
  tc.style.opacity = '0';
  if (dir === 'r') v = 'send';
  setTimeout(function() { ci++; rc(); ud(); anim = false; document.getElementById('fb').style.display = ci >= D.issues.length ? 'none' : 'flex'; }, 350);
}

function os() { window.open(D.url, '_blank'); }

function sd() {
  document.getElementById('sk').style.display = 'none';
  document.getElementById('fb').style.display = 'none';
  document.getElementById('dn').classList.add('on');
  var b = document.getElementById('ob');
  var t = document.getElementById('dt');
  var ep = document.getElementById('ep');
  if (v === 'send') { b.className = 'oc go'; b.innerHTML = 'DECISION: SEND'; t.innerHTML = 'Prospect passed the sniff test. Email draft ready.'; } 
  else { b.className = 'oc no'; b.innerHTML = 'DECISION: SKIP'; t.innerHTML = 'This one needs more vetting or better targets exist.'; }
  ep.textContent = D.emailText;
}

async function copyE() {
  try { await navigator.clipboard.writeText(D.emailText); 
    var btn = document.getElementById('bcopy'); var orig = btn.textContent; 
    btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = orig; }, 1500); 
  } catch(e) { alert('Email:\n\n' + D.emailText); }
}

function rs() { ci = 0; v = null; anim = false;
  document.getElementById('sk').style.display = 'block';
  document.getElementById('dn').classList.remove('on');
  document.getElementById('fb').style.display = 'flex';
  rc(); ud();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') sl('l');
  if (e.key === 'ArrowRight') sl('r');
  if (e.key === 'o') os();
  if (e.key === 'c') copyE();
  if (e.key === 'r') rs();
});
</script>
</body>
</html>
