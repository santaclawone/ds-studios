<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>DS Studios — Report Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#f4f5f9;color:#1a202c;overflow:hidden;height:100dvh;width:100vw;touch-action:none;-webkit-user-select:none;user-select:none}
.header{background:linear-gradient(135deg,#a3d977,#7aa36f);padding:20px 16px 14px;text-align:center;position:relative;z-index:10}
.header .logo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;background:rgba(26,32,44,.08);display:inline-block;padding:3px 12px;border-radius:10px;margin-bottom:4px}
.header h1{font-size:18px;font-weight:800;letter-spacing:-.5px}
.counter{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:700;background:rgba(26,32,44,.08);padding:4px 12px;border-radius:14px}
.swipe-container{position:relative;height:calc(100dvh - 80px);overflow:hidden}
.cards-wrapper{display:flex;height:100%;transition:transform .35s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.card{min-width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
.card-inner{background:#fff;border-radius:16px;padding:28px 24px 24px;width:100%;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);position:relative}
.region-tag{position:absolute;top:-10px;left:20px;background:#a3d977;color:#1a202c;font-size:10px;font-weight:700;padding:3px 14px;border-radius:12px;text-transform:uppercase;letter-spacing:1px}
.card h2{font-size:20px;font-weight:800;margin:8px 0 4px;line-height:1.3}
.card .url{font-size:11px;color:#9CA3AF;margin-bottom:10px;word-break:break-all}
.score-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:12px auto 12px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .val{position:absolute;font-size:26px;font-weight:800}
.issues-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 16px}
.issue-item{text-align:center;padding:8px;border-radius:8px;font-size:11px;font-weight:600}
.issue-item.crit{background:#fde8e8;color:#E74C3C}
.issue-item.high{background:#fef3c7;color:#F39C12}
.issue-item.med{background:#e0f2fe;color:#4A8FE7}
.issue-item .num{font-size:18px;font-weight:800}
.issue-item .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;opacity:.7}
.view-btn{display:block;background:#1a202c;color:#fff;text-align:center;padding:12px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;transition:background .2s;margin-top:4px}
.view-btn:hover{background:#2d3748}
.nav-controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;z-index:10}
.nav-btn{background:#fff;border:1px solid rgba(0,0,0,.06);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.04);color:#1a202c}
.nav-btn:active{transform:scale(.95)}
.nav-btn:disabled{opacity:.25;pointer-events:none}
.nav-btn:hover{box-shadow:0 4px 12px rgba(163,217,119,.2);border-color:#a3d977}
.dots{display:flex;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:#d1d5db;transition:all .2s}
.dot.active{background:#a3d977;width:18px;border-radius:3px}
@media(max-width:480px){
.card-inner{padding:20px 16px}
.card h2{font-size:17px}
.score-ring{width:64px;height:64px}
.score-ring .val{font-size:20px}
.nav-controls{bottom:12px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">◆ DS Studios</div>
  <h1>Website Health Audits</h1>
  <div class="counter" id="counter"></div>
</div>

<div class="swipe-container" id="swipeContainer">
  <div class="cards-wrapper" id="cardsWrapper"></div>

  <div class="nav-controls">
    <button class="nav-btn" id="prevBtn">←</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="nextBtn">→</button>
  </div>
</div>

<script>
// ===== DATA =====
const CARD_TEMPLATE = (biz, region, index, total) => `
<div class="card">
  <div class="card-inner">
    <div class="region-tag">${region}</div>
    <h2>${biz.name}</h2>
    <div class="url">${biz.url}</div>
    <div class="score-ring" style="background:${scoreBg(biz.score)}20">
      <svg width="80" height="80" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#e5e7eb" stroke-width="8"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="${scoreColor(biz.score)}" stroke-width="8"
          stroke-dasharray="${(52*2*Math.PI)}" stroke-dashoffset="${(52*2*Math.PI)*(1-biz.score/100)}"
          stroke-linecap="round" transform="rotate(-90,60,60)"/>
      </svg>
      <span class="val" style="color:${scoreColor(biz.score)}">${biz.score}</span>
    </div>
    <div class="issues-grid">
      <div class="issue-item crit">
        <div class="num">${biz.crit}</div>
        <div class="lbl">Critical</div>
      </div>
      <div class="issue-item high">
        <div class="num">${biz.high}</div>
        <div class="lbl">High</div>
      </div>
      <div class="issue-item med">
        <div class="num">${biz.med}</div>
        <div class="lbl">Medium</div>
      </div>
      <div class="issue-item" style="background:#f3f4f6">
        <div class="num" style="color:#6b7280">${biz.issues}</div>
        <div class="lbl">Total</div>
      </div>
    </div>
    <a href="reports/${biz.id}.html" class="view-btn">View Full Report →</a>
  </div>
</div>`;

function scoreColor(s){if(s>=75)return '#27AE60';if(s>=55)return '#F39C12';return '#E74C3C'}
function scoreBg(s){if(s>=75)return '#27AE60';if(s>=55)return '#F39C12';return '#E74C3C'}

// ===== LOAD & RENDER =====
const ORDER = ['Westport','Castlebar','Galway','Sligo'];

fetch('reports/prospects-index.json')
.then(r=>r.json())
.then(data=>{
  const flat=[];
  for(const loc of ORDER){
    const list=(data.locations[loc]||[]).sort((a,b)=>b.score-a.score);
    list.forEach(b=>{
      flat.push({...b,crit:0,high:Math.min(b.issues,3),med:Math.max(0,b.issues-3),region:loc});
    });
  }
  const total=flat.length;
  if(!total){document.getElementById('cardsWrapper').innerHTML='<div style="text-align:center;padding:80px 20px;color:#9CA3AF">No reports found.</div>';return}

  // Render cards
  const wrapper=document.getElementById('cardsWrapper');
  wrapper.innerHTML=flat.map((b,i)=>CARD_TEMPLATE(b,b.region,i,total)).join('');

  // Dots
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML=flat.map((_,i)=>`<div class="dot${i===0?' active':''}" data-i="${i}"></div>`).join('');

  // ===== SWIPE LOGIC =====
  let current=0;
  const container=document.getElementById('swipeContainer');
  const prevBtn=document.getElementById('prevBtn');
  const nextBtn=document.getElementById('nextBtn');
  const counter=document.getElementById('counter');

  function updateUI(){
    wrapper.style.transform=`translateX(-${current*100}%)`;
    counter.textContent=`${current+1} of ${total}`;
    prevBtn.disabled=current===0;
    nextBtn.disabled=current===total-1;
    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));
  }

  // Touch swipe
  let startX=0,startY=0,isSwiping=false;
  container.addEventListener('touchstart',e=>{
    startX=e.changedTouches[0].screenX;
    startY=e.changedTouches[0].screenY;
    isSwiping=true;
  },{passive:true});
  container.addEventListener('touchmove',e=>{
    if(!isSwiping)return;
    const dx=e.changedTouches[0].screenX-startX;
    const dy=e.changedTouches[0].screenY-startY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>30){
      e.preventDefault();
    }
  },{passive:false});
  container.addEventListener('touchend',e=>{
    if(!isSwiping)return;
    const dx=e.changedTouches[0].screenX-startX;
    if(Math.abs(dx)>50){
      if(dx<0&&current<total-1){current++;updateUI()}
      else if(dx>0&&current>0){current--;updateUI()}
    }
    isSwiping=false;
  },{passive:true});

  // Button clicks
  prevBtn.addEventListener('click',()=>{if(current>0){current--;updateUI()}});
  nextBtn.addEventListener('click',()=>{if(current<total-1){current++;updateUI()}});

  // Dot clicks
  dotsEl.addEventListener('click',e=>{
    const dot=e.target.closest('.dot');
    if(!dot)return;
    current=parseInt(dot.dataset.i);
    updateUI();
  });

  // Keyboard
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'&&current>0){current--;updateUI()}
    if(e.key==='ArrowRight'&&current<total-1){current++;updateUI()}
  });

  updateUI();
})
.catch(e=>{
  document.getElementById('cardsWrapper').innerHTML='<div style="text-align:center;padding:80px 20px;color:#E74C3C">Failed to load reports. Check your connection.</div>';
});
</script>
</body>
</html>
