<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>DS Studios — Report Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#f4f5f9;color:#1a202c;overflow:hidden;height:100dvh;width:100vw;touch-action:none;-webkit-user-select:none;user-select:none}
.top-bar{background:linear-gradient(135deg,#a3d977,#7aa36f);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;height:44px;flex-shrink:0}
.top-bar .logo{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;background:rgba(26,32,44,.08);padding:3px 10px;border-radius:8px}
.top-bar .ctr{font-size:13px;font-weight:700}
.swipe-wrap{position:relative;height:calc(100dvh - 44px);overflow:hidden}
.track{display:flex;height:100%;transition:transform .3s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.card{min-width:100%;height:100%;display:flex;flex-direction:column;background:#f4f5f9;overflow:hidden}
.card-scroll{flex:1;overflow-y:auto;padding:16px 16px 8px;-webkit-overflow-scrolling:touch;-ms-overflow-style:-ms-autohiding-scrollbar}
.loc-badge{display:inline-block;background:#a3d977;padding:2px 12px;border-radius:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.biz-name{font-size:22px;font-weight:800;line-height:1.2;margin-bottom:2px}
.biz-url{font-size:11px;color:#6b7280;margin-bottom:2px}
.biz-type{font-size:10px;color:#9CA3AF;text-transform:capitalize}
.score-row{display:flex;align-items:center;gap:16px;margin:10px 0 8px;padding:10px 14px;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.score-ring{position:relative;width:60px;height:60px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800}
.score-ring .lbl{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-size:7px;text-transform:uppercase;letter-spacing:.5px;color:#9CA3AF;font-weight:600}
.sev-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.sev-item{text-align:center;padding:3px 4px;border-radius:6px;font-size:10px;font-weight:600}
.sev-item .n{font-size:15px;font-weight:800;display:block;line-height:1.2}
.sev-item .l{font-size:7px;text-transform:uppercase;letter-spacing:.5px;opacity:.7}
.sev-crit{background:#fde8e8;color:#E74C3C}
.sev-high{background:#fef3c7;color:#F39C12}
.sev-med{background:#e0f2fe;color:#4A8FE7}
.sev-low{background:#f3f4f6;color:#6b7280}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6b7280;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.issue-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border-radius:8px;margin-bottom:4px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.issue-row .sev-dot{width:5px;height:20px;border-radius:3px;flex-shrink:0}
.issue-row .lbl{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.issue-row .type-badge{font-size:8px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.type-seo{background:#ede9fe;color:#7C3AED}
.type-performance{background:#fef3c7;color:#F39C12}
.type-accessibility{background:#dbeafe;color:#2563EB}
.type-mobile{background:#d1fae5;color:#059669}
.type-security{background:#fce7f3;color:#DB2777}
.type-design{background:#f3f4f6;color:#4b5563}
.type-business{background:#e0f2fe;color:#0284C7}
.type-content{background:#fef9c3;color:#CA8A04}
.type-social{background:#f3e8ff;color:#9333EA}
.pos-section{margin:8px 0 4px}
.pos-row{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#f0fdf4;border-radius:8px;margin-bottom:3px;font-size:11px;color:#166534}
.pos-row::before{content:'✓';font-weight:800;color:#16a34a;font-size:13px}
.nav-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 16px 8px;background:#f4f5f9;flex-shrink:0}
.nav-btn{background:#fff;border:1px solid rgba(0,0,0,.06);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.04);color:#1a202c}
.nav-btn:active{transform:scale(.92)}
.nav-btn:disabled{opacity:.2;pointer-events:none}
.dots{display:flex;gap:3px;flex-wrap:wrap;max-width:200px;justify-content:center}
.dot{width:5px;height:5px;border-radius:50%;background:#d1d5db;transition:all .2s}
.dot.active{background:#a3d977;width:16px;border-radius:3px}
.loading-card{display:flex;align-items:center;justify-content:center;min-width:100%;height:100%;font-size:13px;color:#9CA3AF;flex-direction:column;gap:6px}
.loading-card::after{content:'';width:20px;height:20px;border:2px solid #e5e7eb;border-top-color:#a3d977;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:600px){
.biz-name{font-size:24px}
.card-scroll{padding:24px 24px 12px;max-width:640px;margin:0 auto}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">◆ DS Studios</div>
  <div class="ctr" id="ctr">—</div>
</div>

<div class="swipe-wrap" id="swipeWrap">
  <div class="track" id="track"></div>
  <div class="nav-bar" id="navBar">
    <button class="nav-btn" id="prevBtn">←</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="nextBtn">→</button>
  </div>
</div>

<script>
const TOWN_ORDER=['Westport','Castlebar','Galway','Sligo'];
const typeClass=t=>{
  const m={'seo':'type-seo','performance':'type-performance','accessibility':'type-accessibility','mobile':'type-mobile','security':'type-security','design':'type-design','business':'type-business','content':'type-content','social':'type-social'};
  return m[(t||'other').toLowerCase()]||'type-design'
};
const scoreColor=s=>s>=75?'#27AE60':s>=55?'#F39C12':'#E74C3C';
const circleLen=2*Math.PI*38;

function buildReportHTML(rpt,biz){
  const s=rpt.score;
  const sev=[{label:'Critical',n:rpt.critical||0,cls:'sev-crit'},
             {label:'High',n:rpt.high||0,cls:'sev-high'},
             {label:'Medium',n:rpt.medium||0,cls:'sev-med'},
             {label:'Low',n:rpt.low||0,cls:'sev-low'}];
  const issues=(rpt.issues||[]).slice(0,25);
  const positives=(rpt.positives||[]).slice(0,12);
  const bizUrl=(rpt.url||biz.url||'').replace(/^https?:\/\//,'');

  let h=`<div class="card-scroll">
    <div class="loc-badge">${(rpt.location||biz.loc||'').toUpperCase()}</div>
    <div class="biz-name">${rpt.businessName||biz.name}</div>
    <div class="biz-url">${bizUrl}</div>
    <div class="biz-type">${rpt.businessType||''}</div>
    <div class="score-row">
      <div class="score-ring">
        <svg width="60" height="60" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="38" fill="none" stroke="#e5e7eb" stroke-width="6"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="${scoreColor(s)}" stroke-width="6"
            stroke-dasharray="${circleLen}" stroke-dashoffset="${circleLen*(1-s/100)}"
            stroke-linecap="round"/>
        </svg>
        <div class="val" style="color:${scoreColor(s)}">${s}</div>
        <div class="lbl">Score</div>
      </div>
      <div class="sev-grid">
        ${sev.map(x=>`<div class="sev-item ${x.cls}"><span class="n">${x.n}</span><span class="l">${x.label}</span></div>`).join('')}
      </div>
    </div>`;

  if(positives.length){
    h+=`<div class="pos-section">
      <div class="section-title">✓ What's Working (${positives.length})</div>
      ${positives.map(p=>`<div class="pos-row">${p.detail||p}</div>`).join('')}
    </div>`;
  }

  h+=`<div class="issues-section">
    <div class="section-title">Issues (${issues.length}) <span style="font-weight:400;font-size:10px;color:#9CA3AF">${rpt.analyzedAt||''}</span></div>`;
  if(issues.length){
    issues.forEach(iss=>{
      const sd=iss.severity==='critical'?'#E74C3C':iss.severity==='high'?'#F39C12':iss.severity==='medium'?'#4A8FE7':'#9CA3AF';
      h+=`<div class="issue-row"><div class="sev-dot" style="background:${sd}"></div><div class="lbl">${iss.label}</div><span class="type-badge ${typeClass(iss.type)}">${(iss.type||'other').substring(0,4)}</span></div>`;
    });
  } else {
    h+=`<div class="issue-row" style="background:#f0fdf4;color:#166534">No significant issues found</div>`;
  }
  h+=`</div><div style="height:4px"></div></div>`;
  return h;
}

// ===== INIT =====
fetch('reports/prospects-index.json').then(r=>r.json()).then(idx=>{
  const all=[];
  for(const loc of TOWN_ORDER){
    const list=(idx.locations[loc]||[]).sort((a,b)=>b.score-a.score);
    list.forEach(b=>all.push({id:b.id,name:b.name,score:b.score,issues:b.issues,url:b.url,loc:b.loc||loc}));
  }
  if(!all.length)return;

  const total=all.length,track=document.getElementById('track'),dotsEl=document.getElementById('dots'),
        ctr=document.getElementById('ctr'),prevBtn=document.getElementById('prevBtn'),
        nextBtn=document.getElementById('nextBtn'),swipeWrap=document.getElementById('swipeWrap');
  const cache={};

  // Create card slots
  all.forEach((b,i)=>{
    const div=document.createElement('div');div.className='card loading-card';
    div.innerHTML='<span>Loading…</span>';
    track.appendChild(div);
  });
  dotsEl.innerHTML=all.map((_,i)=>`<div class="dot${i===0?' active':''}" data-i="${i}"></div>`).join('');

  function loadAndRender(idx){
    const biz=all[idx];
    const el=track.querySelectorAll('.card')[idx];
    if(!el)return;
    if(cache[biz.id]){
      el.className='card';el.innerHTML=cache[biz.id];
      return;
    }
    fetch(`reports/${biz.id}.json`).then(r=>r.json()).then(rpt=>{
      const html=buildReportHTML(rpt,biz);
      cache[biz.id]=html;
      el.className='card';el.innerHTML=html;
    }).catch(()=>{
      el.className='card';
      el.innerHTML=`<div class="card-scroll"><div style="text-align:center;padding:40px;color:#E74C3C;font-size:13px">Failed to load report</div></div>`;
    });
  }

  function preload(idx){
    const biz=all[idx];
    if(!biz||cache[biz.id])return;
    fetch(`reports/${biz.id}.json`).then(r=>r.json()).then(rpt=>{
      cache[biz.id]=buildReportHTML(rpt,biz);
      // If user already swiped to this card, render it
      const el=track.querySelectorAll('.card')[idx];
      if(el&&el.classList.contains('loading-card')){el.className='card';el.innerHTML=cache[biz.id];}
    }).catch(()=>{});
  }

  let cur=0;
  function update(){
    track.style.transform=`translateX(-${cur*100}%)`;
    ctr.textContent=`${cur+1}/${total}`;
    prevBtn.disabled=cur===0;nextBtn.disabled=cur===total-1;
    document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
    loadAndRender(cur);
    preload(cur+1);preload(cur+2);preload(cur+3);
  }

  // Touch
  let sx=0,sy=0,sw=false;
  swipeWrap.addEventListener('touchstart',e=>{sx=e.changedTouches[0].screenX;sy=e.changedTouches[0].screenY;sw=true},{passive:true});
  swipeWrap.addEventListener('touchmove',e=>{
    if(!sw)return;const dx=e.changedTouches[0].screenX-sx;const dy=e.changedTouches[0].screenY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>20)e.preventDefault();
  },{passive:false});
  swipeWrap.addEventListener('touchend',e=>{
    if(!sw)return;const dx=e.changedTouches[0].screenX-sx;
    if(Math.abs(dx)>40){if(dx<0&&cur<total-1){cur++;update()}else if(dx>0&&cur>0){cur--;update()}}
    sw=false;
  },{passive:true});

  prevBtn.addEventListener('click',()=>{if(cur>0){cur--;update()}});
  nextBtn.addEventListener('click',()=>{if(cur<total-1){cur++;update()}});
  dotsEl.addEventListener('click',e=>{const d=e.target.closest('.dot');if(d){cur=parseInt(d.dataset.i);update()}});
  document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'&&cur>0){cur--;update()}if(e.key==='ArrowRight'&&cur<total-1){cur++;update()}});

  update(); // kick off
});
</script>
</body>
</html>
